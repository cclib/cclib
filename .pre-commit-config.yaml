---
fail_fast: false
ci:
  autofix_prs: false
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)(
              \.bpa$|
              \.bpaspin$|
              \.cube$|
              \.in$|
              \.inp$|
              \.molden$|
              \.out$|
              ^data/ADF|
              ^data/CFOUR|
              ^data/DALTON|
              ^data/FChk|
              ^data/GAMESS|
              ^data/Gaussian|
              ^data/Jaguar|
              ^data/Molcas|
              ^data/Molpro|
              ^data/MOPAC|
              ^data/NBO|
              ^data/NWChem|
              ^data/ORCA|
              ^data/Psi4|
              ^data/QChem|
              ^data/regression|
              ^data/Turbomole|
              ^data/XTB
          )
      - id: end-of-file-fixer
        exclude: |
          (?x)(
              \.bpa$|
              \.bpaspin$|
              \.cube$|
              \.in$|
              \.inp$|
              \.molden$|
              \.out$|
              ^data/ADF|
              ^data/CFOUR|
              ^data/DALTON|
              ^data/FChk|
              ^data/GAMESS|
              ^data/Gaussian|
              ^data/Jaguar|
              ^data/Molcas|
              ^data/Molpro|
              ^data/MOPAC|
              ^data/NBO|
              ^data/NWChem|
              ^data/ORCA|
              ^data/Psi4|
              ^data/QChem|
              ^data/regression|
              ^data/Turbomole|
              ^data/XTB
          )
      - id: fix-byte-order-marker
        exclude: |
          (?x)(
              \.bpa$|
              \.bpaspin$|
              \.cube$|
              \.in$|
              \.inp$|
              \.molden$|
              \.out$|
              ^data/ADF|
              ^data/CFOUR|
              ^data/DALTON|
              ^data/FChk|
              ^data/GAMESS|
              ^data/Gaussian|
              ^data/Jaguar|
              ^data/Molcas|
              ^data/Molpro|
              ^data/MOPAC|
              ^data/NBO|
              ^data/NWChem|
              ^data/ORCA|
              ^data/Psi4|
              ^data/QChem|
              ^data/regression|
              ^data/Turbomole|
              ^data/XTB
          )
      - id: check-merge-conflict
      - id: check-json
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: "v1.16.1"
  #   hooks:
  #     - id: mypy
  #       additional_dependencies:
  #         - numpy
  #         - packaging
  #         - pandas-stubs
  #         - pytest
  #         # - scipy
  #         - types-requests
  #         - types-setuptools
  #         - versioningit
  #       args: []
  #       exclude: |
  #         (?x)(
  #             ^test/
  #         )
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        files: \.py$
        args:
          - --license-filepath
          - .github/license_header.txt
          - --use-current-year
          - --no-extra-eol
      - id: remove-crlf
        exclude: |
          (?x)(
              \.bpa$|
              \.bpaspn$|
              \.cube$|
              \.in$|
              \.inp$|
              \.molden$|
              \.out$|
              ^data/ADF|
              ^data/CFOUR|
              ^data/DALTON|
              ^data/FChk|
              ^data/GAMESS|
              ^data/Gaussian|
              ^data/Jaguar|
              ^data/Molcas|
              ^data/Molpro|
              ^data/MOPAC|
              ^data/NBO|
              ^data/NWChem|
              ^data/ORCA|
              ^data/Psi4|
              ^data/QChem|
              ^data/regression|
              ^data/Turbomole|
              ^data/XTB
          )
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: "v1.10.0"
    hooks:
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v1.1.3
    hooks:
      - id: tombi-format
        # Requires https://github.com/cclib/cclib/pull/1775
        # - id: tombi-lint
  - repo: https://github.com/google/yamlfmt
    rev: "v0.21.0"
    hooks:
      - id: yamlfmt
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: "v1.25.2"
    hooks:
      - id: zizmor
        args: [--no-progress, --persona=pedantic, --fix=all]
